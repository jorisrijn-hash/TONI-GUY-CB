<!DOCTYPE html>
<html>
<head>
    <title>TONI&GUY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            height: 100vh;
            padding: 30px;
        }

        /* GEMINIMALISEERDE BALK */
        .chat-minimized {
            display: none;
            background: #000;
            color: white;
            width: 320px;
            padding: 14px 18px;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .chat-minimized.zichtbaar {
            display: flex;
        }

        .minimized-links {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .minimized-logo {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
        }

        .minimized-sub {
            font-size: 10px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .minimized-open {
            font-size: 20px;
            color: white;
            font-weight: 300;
        }

        /* CHAT CONTAINER */
        .chat-container {
            width: 380px;
            height: 700px;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        .chat-container.verborgen {
            display: none;
        }

        .chat-header {
            background: #000;
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-logo {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .header-sub {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #888;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .header-min {
            font-size: 22px;
            color: white;
            cursor: pointer;
            font-weight: 300;
            line-height: 1;
            padding: 4px 8px;
            transition: color 0.2s;
        }

        .header-min:hover { color: #aaa; }

        #chatvenster {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fafafa;
        }

        #chatvenster::-webkit-scrollbar { width: 3px; }
        #chatvenster::-webkit-scrollbar-thumb { background: #ddd; }

        .bericht-wrapper-bot {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .bericht-wrapper-jij {
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            gap: 10px;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            flex-shrink: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .avatar-bot { background: #000; color: white; }
        .avatar-jij { background: #555; color: white; font-size: 11px; }

        .bericht-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 82%;
        }

        .naam {
            font-size: 11px;
            font-weight: 700;
            color: #333;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .naam-jij { text-align: right; }

        .bubble {
            padding: 11px 15px;
            font-size: 13px;
            line-height: 1.5;
        }

        .bubble-bot {
            background: white;
            color: #222;
            border: 1px solid #e5e5e5;
            border-radius: 0 12px 12px 12px;
        }

        .bubble-jij {
            background: #000;
            color: white;
            border-radius: 12px 0 12px 12px;
        }

        .timestamp { font-size: 10px; color: #bbb; }
        .timestamp-jij { text-align: right; }

        /* DAGEN */
        .dagen-wrapper {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
            transition: transform 0.7s ease, opacity 0.7s ease;
        }

        .dagen-wrapper.verkleind {
            transform: scale(0.80);
            transform-origin: left top;
            opacity: 0.5;
        }

        .dag-knop {
            padding: 7px 11px;
            border: 1px solid #ddd;
            background: #f5f5f5;
            color: #ccc;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: default;
            transition: all 0.3s ease;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        .dag-knop.beschikbaar {
            border-color: #000;
            color: #000;
            background: white;
            cursor: pointer;
        }

        .dag-knop.beschikbaar:hover { background: #000; color: white; }
        .dag-knop.geselecteerd { background: #000; color: white; border-color: #000; }

        /* TIJDEN */
        .tijden-wrapper {
            display: flex;
            gap: 5px;
            margin-top: 8px;
            flex-wrap: wrap;
            animation: inFade 0.7s ease;
        }

        @keyframes inFade {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tijd-knop {
            padding: 7px 11px;
            border: 1px solid #ddd;
            background: #f5f5f5;
            color: #ccc;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: default;
            transition: all 0.3s ease;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        .tijd-knop.beschikbaar {
            border-color: #000;
            color: #000;
            background: white;
            cursor: pointer;
        }

        .tijd-knop.beschikbaar:hover { background: #000; color: white; }
        .tijd-knop.geselecteerd { background: #000 !important; color: white !important; }

        /* FORMULIER */
        .formulier-wrapper {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: inFade 0.7s ease;
        }

        .formulier-wrapper input {
            padding: 10px 14px;
            border: 1px solid #ddd;
            font-size: 12px;
            font-family: 'Montserrat', Arial, sans-serif;
            letter-spacing: 0.5px;
            outline: none;
            transition: border 0.2s;
        }

        .formulier-wrapper input:focus { border-color: #000; }

        .formulier-wrapper input::placeholder {
            color: #bbb;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .formulier-bevestig {
            padding: 11px;
            background: #000;
            color: white;
            border: none;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Montserrat', Arial, sans-serif;
            transition: background 0.2s;
        }

        .formulier-bevestig:hover { background: #333; }

        /* FAQ */
        .faq-wrapper {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: inFade 0.6s ease;
        }

        .faq-item {
            padding: 10px 14px;
            border: 1px solid #e5e5e5;
            background: white;
            font-size: 12px;
            color: #333;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all 0.2s;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        .faq-item:hover {
            background: #000;
            color: white;
            border-color: #000;
        }

        /* SNELKNOPPEN */
        .snelknoppen {
            padding: 10px 14px;
            display: flex;
            gap: 6px;
            background: white;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }

        .snel-knop {
            flex: 1;
            padding: 8px 6px;
            border: 1px solid #000;
            background: white;
            color: #000;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        .snel-knop:hover { background: #000; color: white; }

        /* INPUT */
        .chat-input {
            padding: 12px 14px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            flex-shrink: 0;
        }

        #invoer {
            flex: 1;
            padding: 11px 14px;
            border: 1px solid #ddd;
            font-size: 12px;
            font-family: 'Montserrat', Arial, sans-serif;
            letter-spacing: 0.5px;
            outline: none;
            transition: border 0.2s;
        }

        #invoer:focus { border-color: #000; }

        #invoer::placeholder {
            color: #bbb;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #knop {
            width: 40px;
            height: 40px;
            background: #000;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: white;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #knop:hover { background: #333; }
    </style>
</head>
<body>

    <!-- GEMINIMALISEERDE BALK -->
    <div class="chat-minimized" id="minimizedBar" onclick="openChat()">
        <div class="minimized-links">
            <div>
                <div class="minimized-logo">TONI&GUY</div>
                <div class="minimized-sub">Virtual Assistant</div>
            </div>
        </div>
        <span class="minimized-open">+</span>
    </div>

    <!-- CHAT -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <div>
                <div class="header-logo">TONI&GUY</div>
                <div class="header-sub">Virtual Assistant</div>
            </div>
            <span class="header-min" onclick="minimizeChat()">—</span>
        </div>

        <div id="chatvenster"></div>

        <div class="snelknoppen">
            <button class="snel-knop" onclick="snelKlik('afspraak maken')">+ AFSPRAAK</button>
            <button class="snel-knop" onclick="snelKlik('openingstijden')">⏱ TIJDEN</button>
            <button class="snel-knop" onclick="toonFAQ()">? FAQ</button>
        </div>

        <div class="chat-input">
            <input id="invoer" type="text" placeholder="Stel een vraag...">
            <button id="knop">➤</button>
        </div>
    </div>

    <script>
        let geselecteerdeDag = "";
        let geselecteerdeTijd = "";

        const faqs = [
            { vraag: "Wat zijn de prijzen?", antwoord: "Knippen vanaf €45, verven vanaf €80. Vraag naar ons volledige prijsoverzicht in de salon." },
            { vraag: "Waar zijn jullie gevestigd?", antwoord: "TONI&GUY heeft salons in Amsterdam, Den Haag, Haarlem, Rotterdam, Utrecht, Maastricht en Westfield." },
            { vraag: "Kan ik zonder afspraak komen?", antwoord: "We werken op afspraak. Loop-ins zijn mogelijk, maar niet gegarandeerd." },
            { vraag: "Welke producten gebruiken jullie?", antwoord: "Wij werken met Label.M, Schwarzkopf, ghd en Authentic Beauty Concept." },
            { vraag: "Hoe kan ik annuleren?", antwoord: "Bel of mail de salon minimaal 24 uur van tevoren. Zie onze contactpagina voor nummers." }
        ];

        function minimizeChat() {
            document.getElementById("chatContainer").classList.add("verborgen");
            document.getElementById("minimizedBar").classList.add("zichtbaar");
        }

        function openChat() {
            document.getElementById("chatContainer").classList.remove("verborgen");
            document.getElementById("minimizedBar").classList.remove("zichtbaar");
        }

        function getTijd() {
            const nu = new Date();
            return nu.getHours() + ":" + String(nu.getMinutes()).padStart(2, "0");
        }

        function snelKlik(tekst) {
            voegJijToe(tekst);
            verstuurNaarBot(tekst);
        }

        function toonFAQ() {
            const div = document.getElementById("chatvenster");
            const wrapper = document.createElement("div");
            wrapper.className = "bericht-wrapper-bot";

            const faqItems = faqs.map(f =>
                `<div class="faq-item" onclick="kiesFAQ('${f.vraag}', '${f.antwoord}')">${f.vraag}</div>`
            ).join("");

            wrapper.innerHTML = `
                <div class="avatar avatar-bot">T&G</div>
                <div class="bericht-content">
                    <span class="naam">Toni&amp;Guy</span>
                    <div class="bubble bubble-bot">Veelgestelde vragen — kies er een:</div>
                    <div class="faq-wrapper">${faqItems}</div>
                    <span class="timestamp">${getTijd()}</span>
                </div>
            `;

            div.appendChild(wrapper);
            div.scrollTop = div.scrollHeight;
        }

        function kiesFAQ(vraag, antwoord) {
            voegJijToe(vraag);
            document.querySelectorAll(".faq-wrapper").forEach(e => e.remove());
            voegBotToe(antwoord);
        }

        function voegBotToe(tekst, toonKnoppen = false) {
            const div = document.getElementById("chatvenster");
            const wrapper = document.createElement("div");
            wrapper.className = "bericht-wrapper-bot";

            const dagenHTML = toonKnoppen ? `
                <div class="dagen-wrapper" id="dagenWrapper">
                    <button class="dag-knop">MA</button>
                    <button class="dag-knop">DI</button>
                    <button class="dag-knop beschikbaar" onclick="kiesDag(this, 'Woensdag')">WO</button>
                    <button class="dag-knop">DO</button>
                    <button class="dag-knop">VR</button>
                    <button class="dag-knop">ZA</button>
                </div>
                <div id="tijdenWrapper"></div>
                <div id="formulierWrapper"></div>
            ` : "";

            wrapper.innerHTML = `
                <div class="avatar avatar-bot">T&G</div>
                <div class="bericht-content">
                    <span class="naam">Toni&amp;Guy</span>
                    <div class="bubble bubble-bot">${tekst}</div>
                    ${dagenHTML}
                    <span class="timestamp">${getTijd()}</span>
                </div>
            `;

            div.appendChild(wrapper);
            div.scrollTop = div.scrollHeight;
        }

        function kiesDag(knop, dag) {
            geselecteerdeDag = dag;
            document.querySelectorAll(".dag-knop").forEach(k => k.classList.remove("geselecteerd"));
            knop.classList.add("geselecteerd");
            knop.classList.remove("beschikbaar");
            document.getElementById("dagenWrapper").classList.add("verkleind");

            document.getElementById("tijdenWrapper").innerHTML = `
                <div class="tijden-wrapper">
                    <button class="tijd-knop">09:00</button>
                    <button class="tijd-knop">10:00</button>
                    <button class="tijd-knop beschikbaar" onclick="kiesTijd(this, '11:00')">11:00</button>
                    <button class="tijd-knop">12:00</button>
                    <button class="tijd-knop beschikbaar" onclick="kiesTijd(this, '14:00')">14:00</button>
                    <button class="tijd-knop beschikbaar" onclick="kiesTijd(this, '15:00')">15:00</button>
                    <button class="tijd-knop beschikbaar" onclick="kiesTijd(this, '16:00')">16:00</button>
                    <button class="tijd-knop">17:00</button>
                </div>
            `;
            document.getElementById("chatvenster").scrollTop = 99999;
        }

        function kiesTijd(knop, tijd) {
            geselecteerdeTijd = tijd;
            document.querySelectorAll(".tijd-knop").forEach(k => k.classList.remove("geselecteerd"));
            knop.classList.add("geselecteerd");
            knop.classList.remove("beschikbaar");

            setTimeout(() => {
                document.getElementById("formulierWrapper").innerHTML = `
                    <div class="formulier-wrapper">
                        <input type="text" id="inputNaam" placeholder="Naam" />
                        <input type="tel" id="inputTel" placeholder="Telefoonnummer" />
                        <input type="email" id="inputEmail" placeholder="E-mailadres" />
                        <button class="formulier-bevestig" onclick="bevestigAfspraak()">Bevestig afspraak →</button>
                    </div>
                `;
                document.getElementById("chatvenster").scrollTop = 99999;
            }, 500);
        }

        function bevestigAfspraak() {
            const naam = document.getElementById("inputNaam").value.trim();
            const tel = document.getElementById("inputTel").value.trim();
            const email = document.getElementById("inputEmail").value.trim();

            if (!naam || !tel || !email) { alert("Vul alle velden in."); return; }

            document.getElementById("dagenWrapper").remove();
            document.getElementById("tijdenWrapper").remove();
            document.getElementById("formulierWrapper").remove();

            voegJijToe(`${geselecteerdeDag} ${geselecteerdeTijd} — ${naam}`);
            voegBotToe(`Bedankt, ${naam}. Uw afspraak op ${geselecteerdeDag} om ${geselecteerdeTijd} is bevestigd. Een bevestiging wordt verstuurd naar ${email}. Tot ziens bij TONI&GUY. ✂️`);
        }

        function voegJijToe(tekst) {
            const div = document.getElementById("chatvenster");
            const wrapper = document.createElement("div");
            wrapper.className = "bericht-wrapper-jij";

            wrapper.innerHTML = `
                <div class="bericht-content">
                    <span class="naam naam-jij">U</span>
                    <div class="bubble bubble-jij">${tekst}</div>
                    <span class="timestamp timestamp-jij">${getTijd()}</span>
                </div>
                <div class="avatar avatar-jij">U</div>
            `;

            div.appendChild(wrapper);
            div.scrollTop = div.scrollHeight;
        }

        function verstuurNaarBot(bericht) {
            fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({bericht: bericht})
            })
            .then(r => r.json())
            .then(data => {
                const toonKnoppen = data.antwoord.includes("AFSPRAAK_KNOPPEN");
                const tekst = data.antwoord.replace("AFSPRAAK_KNOPPEN", "");
                voegBotToe(tekst, toonKnoppen);
            });
        }

        document.getElementById("knop").addEventListener("click", stuurBericht);
        document.getElementById("invoer").addEventListener("keypress", function(e) {
            if (e.key === "Enter") stuurBericht();
        });

        function stuurBericht() {
            const bericht = document.getElementById("invoer").value.trim();
            if (!bericht) return;
            voegJijToe(bericht);
            document.getElementById("invoer").value = "";
            verstuurNaarBot(bericht);
        }

        voegBotToe("Welkom bij TONI&GUY. Hoe kan ik u vandaag helpen? ✂️");
    </script>
</body>
</html>
